# ============================================
# embedded-mcp-toolkit 设备配置文件模板
# 复制并修改: cp config.example.yaml config.yaml
# ============================================

# 默认使用的设备（对应 devices 下的 key）
default: board-b

devices:
  # ---- 设备 A ----
  board-a:
    adb:
      serialNo: "sn_none"                     # ADB 设备序列号，sn_<序列号> 或 sn_none 表示未配置
    ssh:
      host: "192.168.16.103"
      port: 22
      username: "root"
      password: "root"
      keyProvider:
        mode: "file" # file: 通过文件 IPC 获取密钥; terminal: 终端交互输入
        challengeFilePath: "./.embedded/configs/challenge.txt" # 挑战信息写入文件路径
        keyFilePath: "./.embedded/configs/password_input.txt" # 轮询密钥的文件路径
        pollInterval: 500 # 轮询间隔（毫秒）
        timeout: 120000 # 超时（毫秒），默认 2 分钟
    serial:
      port: "COM4"
      baudRate: 115200
      keyProvider:
        mode: "file"
        challengeFilePath: "./.embedded/configs/challenge.txt"
        keyFilePath: "./.embedded/configs/password_input.txt"
        pollInterval: 500
        timeout: 120000

  # ---- 设备 B ----
  board-b:
    adb:
      serialNo: "sn_none"                     # ADB 设备序列号，sn_<序列号> 或 sn_none 表示未配置
    ssh:
      host: "192.168.16.105"
      port: 22
      username: "root"
      password: "root"
      keyProvider:
        mode: "file"
        challengeFilePath: "./.embedded/configs/challenge.txt"
        keyFilePath: "./.embedded/configs/password_input.txt"
        pollInterval: 500
        timeout: 120000
    serial:
      port: "COM3"
      baudRate: 115200
      keyProvider:
        mode: "file"
        challengeFilePath: "./.embedded/configs/challenge.txt"
        keyFilePath: "./.embedded/configs/password_input.txt"
        pollInterval: 500
        timeout: 120000
  # ---- 设备 nossh ----
  board-nossh:
    adb:
      serialNo: "sn_none"                     # ADB 设备序列号，sn_<序列号> 或 sn_none 表示未配置
    ssh:
      host: "none"
      port: 22
      username: "sumu"
      password: "sumu"
      keyProvider:
        mode: "file"
        challengeFilePath: "./.embedded/configs/challenge.txt"
        keyFilePath: "./.embedded/configs/password_input.txt"
        pollInterval: 500
        timeout: 120000
    serial:
      port: "COM3"
      baudRate: 115200
      keyProvider:
        mode: "file"
        challengeFilePath: "./.embedded/configs/challenge.txt"
        keyFilePath: "./.embedded/configs/password_input.txt"
        pollInterval: 500
        timeout: 120000
  # ---- 设备 noserial ----
  board-noserial:
    adb:
      serialNo: "sn_none"                     # ADB 设备序列号，sn_<序列号> 或 sn_none 表示未配置
    ssh:
      host: "1.1.1.1"
      port: 22
      username: "sumu"
      password: "sumu"
      keyProvider:
        mode: "file"
        challengeFilePath: "./.embedded/configs/challenge.txt"
        keyFilePath: "./.embedded/configs/password_input.txt"
        pollInterval: 500
        timeout: 120000
    serial:
      port: "none"
      baudRate: 115200
      keyProvider:
        mode: "file"
        challengeFilePath: "./.embedded/configs/challenge.txt"
        keyFilePath: "./.embedded/configs/password_input.txt"
        pollInterval: 500
        timeout: 120000
